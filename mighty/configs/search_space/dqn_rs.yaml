hyperparameters:
  # Core training hyperparameters
  algorithm_kwargs.learning_rate:
    type: uniform_float
    lower: 1e-5
    upper: 1e-2
    log: true
    default_value: 2.3e-3
    
  algorithm_kwargs.batch_size:
    type: categorical
    choices: [32, 64, 128, 256, 512]
    default_value: 128
    
  algorithm_kwargs.gamma:
    type: uniform_float
    lower: 0.95
    upper: 0.999
    default_value: 0.99
    
  algorithm_kwargs.learning_starts:
    type: categorical
    choices: [500, 1000, 2000, 5000]
    default_value: 1000
    
  # Network architecture
  algorithm_kwargs.n_units:
    type: categorical
    choices: [128, 256, 512]
    default_value: 256
    
  algorithm_kwargs.q_kwargs.feature_extractor_kwargs.hidden_sizes:
    type: categorical
    choices: [[128], [256], [512], [128, 128], [256, 256]]
    default_value: [256]
    
  algorithm_kwargs.q_kwargs.head_kwargs.hidden_sizes:
    type: categorical
    choices: [[128], [256], [512]]
    default_value: [256]
    
  algorithm_kwargs.q_kwargs.dueling:
    type: categorical
    choices: [true, false]
    default_value: false
    
  # Epsilon decay parameters
  algorithm_kwargs.policy_kwargs.epsilon_start:
    type: uniform_float
    lower: 0.8
    upper: 1.0
    default_value: 1.0
    
  algorithm_kwargs.policy_kwargs.epsilon_final:
    type: uniform_float
    lower: 0.01
    upper: 0.1
    default_value: 0.04
    
  algorithm_kwargs.policy_kwargs.epsilon_decay_steps:
    type: uniform_int
    lower: 2000
    upper: 20000
    default_value: 8000
    
  # Target network updates
  algorithm_kwargs.soft_update_weight:
    type: uniform_float
    lower: 0.001
    upper: 0.02
    log: true
    default_value: 0.005
    
  # Gradient steps (this is very high in your config!)
  algorithm_kwargs.n_gradient_steps:
    type: uniform_int
    lower: 32
    upper: 256
    default_value: 128
    
  # TD update parameters
  algorithm_kwargs.td_update_class:
    type: categorical
    choices: [mighty.mighty_update.QLearning, mighty.mighty_update.DoubleQLearning]
    default_value: mighty.mighty_update.QLearning
    
  # Optimizer parameters (nested)
  algorithm_kwargs.td_update_kwargs.optimizer_kwargs.lr:
    type: uniform_float
    lower: 1e-5
    upper: 1e-2
    log: true
    default_value: 2.3e-3
    
  algorithm_kwargs.td_update_kwargs.optimizer_kwargs.weight_decay:
    type: uniform_float
    lower: 1e-6
    upper: 1e-3
    log: true
    default_value: 1e-5
    
  algorithm_kwargs.td_update_kwargs.optimizer_kwargs.eps:
    type: uniform_float
    lower: 1e-8
    upper: 1e-4
    log: true
    default_value: 1e-6
    
  algorithm_kwargs.td_update_kwargs.max_grad_norm:
    type: uniform_float
    lower: 1.0
    upper: 50.0
    default_value: 10.0
    
  # Replay buffer
  algorithm_kwargs.replay_buffer_kwargs.capacity:
    type: categorical
    choices: [50000, 100000, 200000, 500000]
    default_value: 100000