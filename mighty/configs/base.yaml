defaults:
  - _self_
  - /cluster: local
  - algorithm: ppo
  - environment: pufferlib_ocean/bandit
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog
  - override hydra/help: mighty_help

runner: standard
debug: false
seed: 0
output_dir: runs
experiment_name: mighty_experiment
# This is for optional logging with Weights & Biases
# If trackio is installed, this will be used instead
log_wandb: false
wandb_kwargs:
  project: mighty

algorithm_kwargs: {}

# Training
eval_every_n_steps: 5e3  # After how many steps to evaluate.
n_episodes_eval: 10
checkpoint: null  # Path to load model checkpoint
save_model_every_n_steps: 5e5

hydra:
  run:
    dir: ${output_dir}/${experiment_name}_${seed}
  sweep:
    dir: ${output_dir}/${experiment_name}_${seed}


