# @package _global_
algorithm: SAC
env_id: HalfCheetah-v4

algorithm_kwargs:
  # Network sizes - optimal for HalfCheetah
  n_policy_units:     256       
  n_critic_units:     256       
  soft_update_weight: 0.005    # tau

  # Replay buffer - HalfCheetah specific
  replay_buffer_class:
    _target_: mighty.mighty_replay.MightyReplay
  replay_buffer_kwargs:
    capacity: 5e6  # 1M is sufficient for HalfCheetah

  # Scheduling & batch-updates - HalfCheetah + 128 envs optimized
  batch_size:       512         # Larger batch for parallel stability
  learning_starts:  25600       # 128 envs * 200 steps (conservative start)
  update_every:     1           # Update every step for HalfCheetah
  n_gradient_steps: 1           # Single gradient step works well

  # Learning rates - HalfCheetah optimized
  policy_lr: 3e-4     # Standard SAC policy LR works well
  q_lr:      1e-3     # Standard SAC Q LR
  alpha_lr:  3e-4     # Match policy LR

  # SAC hyperparameters - HalfCheetah specific
  gamma: 0.99
  alpha: 0.2          # Good starting point, auto-tune will adjust
  auto_alpha: True
  target_entropy: -6.0  # HalfCheetah has 6 action dims, so -6.0

  # Policy configuration
  policy_class: mighty.mighty_exploration.StochasticPolicy
  policy_kwargs:
    entropy_coefficient: 0.0
    discrete: False

  # Normalization - important for HalfCheetah
  normalize_obs: True
  normalize_reward: False  # Don't normalize rewards for HalfCheetah

  # SAC specific frequencies
  policy_frequency: 2           # Delayed policy updates
  target_network_frequency: 1   # Update targets every step

# Environment and training configuration
num_envs: 128
total_timesteps: 3000000      # 3M steps should be sufficient
max_episode_steps: 1000       # HalfCheetah default episode length

# Evaluation and logging
eval_frequency: 25000         # Evaluate every 25k steps
save_frequency: 100000        # Save every 100k steps