# @package _global_
algorithm: SAC

algorithm_kwargs:
  # network sizes (PPO-style)
  n_policy_units:     64       # will become hidden_sizes=[8,8]
  n_critic_units:     64       # same for both Q-nets
  soft_update_weight: 0.01    # maps to tau

  # Replay buffer
  replay_buffer_class:
    _target_: mighty.mighty_replay.MightyReplay
  replay_buffer_kwargs:
    capacity: 1000000

  # Scheduling & batch-updates
  batch_size:       256
  learning_starts:  10000
  update_every:     50
  n_gradient_steps: 1

  # Learning rates
  policy_lr: 0.001
  q_lr:      0.001

  # SAC hyperparameters
  gamma: 0.99
  alpha: 0.2

  # Exploration wrapper
  policy_class: mighty.mighty_exploration.StochasticPolicy
  policy_kwargs:
    entropy_coefficient: 0.2
    discrete: False
