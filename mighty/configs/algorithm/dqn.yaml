# @package _global_
algorithm: DQN
q_func: ???

algorithm_kwargs:
  # Core architecture / model
  n_units: 128
  q_kwargs:
    dueling: False
    feature_extractor_kwargs:
      architecture: mlp
      n_layers: 1
      hidden_sizes: [32]
    head_kwargs:
      hidden_sizes: [32]

  # Exploration (force ε=0.2)
  epsilon: 0.2
  policy_kwargs:
    epsilon: 0.2

  # Replay‐buffer settings
  replay_buffer_class:
    _target_: mighty.mighty_replay.PrioritizedReplay
  replay_buffer_kwargs:
    capacity: 1000000
    alpha: 0.6

  # Training hyperparameters
  learning_rate: 3e-4
  batch_size: 32
  gamma: 0.99
  learning_starts: 10000        # wait 10k transitions before training

  # Target‐network / updating
  use_target: True
  soft_update_weight: 0.1
  target_update_freq: null

  # Choose plain Q‐learning instead of DDQN
  td_update_class: mighty.mighty_update.QLearning

  # ‣ IMPORTANT: explicitly configure the optimizer inside your TD updater
  td_update_kwargs:
    gamma: 0.99
    # optimizer_class: torch.optim.Adam
    optimizer_kwargs:
      lr: 3e-4
      eps: 1e-5
    max_grad_norm: 10.0

  # Checkpointing
  save_replay: True
  n_gradient_steps: 1

  # Misc/Evaluation/Logging
  log_wandb: False
  wandb_kwargs:
    project: "my_dqn_experiment"
    name: "DQN-prioritized-replay"