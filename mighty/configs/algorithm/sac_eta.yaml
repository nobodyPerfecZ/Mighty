# @package _global_
algorithm: SACEta
env_id: HalfCheetah-v4

algorithm_kwargs:

  # Normalization
  normalize_obs: False
  normalize_reward: False
  rescale_action: True  # CRITICAL: Must be True for MuJoCo

  # Network sizes
  n_policy_units: 256
  soft_update_weight: 0.005  # tau in SAC terms

  # Replay buffer
  replay_buffer_class:
    _target_: mighty.mighty_replay.MightyReplay
  replay_buffer_kwargs:
    capacity: 1e6


  # Scheduling & batch-updates
  batch_size: 256
  learning_starts: 5000
  update_every: 1
  n_gradient_steps: 1

  # Learning rates
  policy_lr: 3e-4
  q_lr: 1e-3
  alpha_lr: 3e-4

  # SAC hyperparameters
  gamma: 0.99
  alpha: 0.2
  auto_alpha: True
  target_entropy: null  # Let it auto-compute as -action_dim

  # SACEta hyperparameters
  target_risk_ratio: 0.1
  eta_lr: 3e-4

  # Network architecture
  hidden_sizes: [256, 256]
  activation: relu
  log_std_min: -5
  log_std_max: 2

  # Policy configuration
  policy_class: mighty.mighty_exploration.StochasticPolicy
  policy_kwargs:
    discrete: False

  # SAC specific frequencies
  policy_frequency: 2
  target_network_frequency: 1

# Environment and training configuration
num_envs: 1
total_timesteps: 1000000
max_episode_steps: 1000

# Evaluation and logging
eval_frequency: 10000
save_frequency: 50000

# Command to run:
# python mighty/run_mighty.py algorithm=sac_eta env=HalfCheetah-v4 num_steps=1e6 num_envs=1
