# @package _global_
algorithm: PPO

algorithm_kwargs:
  # Scale [-1, 1] actions to the environment's action bounds
  rescale_action: True

  rollout_buffer_class:
    _target_: mighty.mighty_replay.MightyRolloutBuffer

  rollout_buffer_kwargs:
    buffer_size: 128        # ← CHANGED: steps per environment (16 × 128 = 2048 total)
    gamma: 0.99
    gae_lambda: 0.95
    obs_shape: ???
    act_dim: ???
    n_envs: ???
    discrete_action: ???

  # Optimiser and update settings
  learning_rate: 3e-4     # matches CleanRL's default
  batch_size: 2048        # ← CHANGED: 16 environments × 128 steps = 2048 total samples
  gamma: 0.99
  ppo_clip: 0.2           # CleanRL uses 0.2
  value_loss_coef: 0.5    # reduce critic weight back to standard
  entropy_coef: 0.01      # no entropy bonus by default in CleanRL PPO
  max_grad_norm: 0.5      # gradient clipping

  hidden_sizes: [256, 256]
  activation: "tanh"

  n_gradient_steps: 1     # one gradient step per rollout
  n_epochs: 10            # ten update epochs per rollout
  minibatch_size: 128      # ← KEEP: creates 2048 ÷ 64 = 32 minibatches
  kl_target: null         # disable KL‑based early stopping
  use_value_clip: true    # clip value loss like CleanRL

  policy_class: mighty.mighty_exploration.StochasticPolicy
  policy_kwargs:
    entropy_coefficient: 0.0


# python mighty/run_mighty.py algorithm=ppo_pendulum env=Pendulum-v1 num_steps=1e6 num_envs=16