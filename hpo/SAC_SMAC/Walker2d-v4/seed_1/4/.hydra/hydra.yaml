hydra:
  run:
    dir: ${output_dir}/${experiment_name}_${seed}
  sweep:
    dir: ${output_dir}/${experiment_name}_${seed}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 2880
    cpus_per_task: 1
    gpus_per_node: null
    tasks_per_node: 1
    mem_gb: 50
    nodes: 1
    name: ${hydra.job.name}
    stderr_to_stdout: false
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    partition: ai,tnt
    qos: null
    comment: null
    constraint: null
    exclude: null
    gres: null
    cpus_per_gpu: null
    gpus_per_task: null
    mem_per_gpu: null
    mem_per_cpu: null
    account: null
    signal_delay_s: 120
    max_num_timeout: 0
    additional_parameters: {}
    array_parallelism: 256
    setup:
    - source .venv/bin/activate
    - export JAX_PLATFORM_NAME=cpu
  sweeper:
    _target_: hydra_plugins.hypersweeper.hypersweeper.Hypersweeper
    opt_constructor: hydra_plugins.hyper_smac.hyper_smac.make_smac
    search_space: ${search_space}
    resume: false
    budget: null
    n_trials: 32
    budget_variable: null
    loading_variable: null
    saving_variable: null
    sweeper_kwargs:
      maximize: true
      job_array_size_limit: 16
      seeds:
      - 0
      - 1
      - 2
      optimizer_kwargs:
        smac_facade:
          _target_: smac.facade.blackbox_facade.BlackBoxFacade
          _partial_: true
          logging_level: 20
        scenario:
          seed: 42
          n_trials: ${hydra.sweeper.n_trials}
          deterministic: true
          output_directory: ${hydra.sweep.dir}
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - env=Walker2d-v4
    - num_envs=64
    - num_steps=500000
    - algorithm_kwargs.alpha=0.1611006618012
    - algorithm_kwargs.alpha_lr=0.0049113986423
    - algorithm_kwargs.batch_size=128
    - algorithm_kwargs.gamma=0.9845515197115
    - algorithm_kwargs.learning_starts=10000
    - algorithm_kwargs.n_gradient_steps=2
    - algorithm_kwargs.n_policy_units=512
    - algorithm_kwargs.policy_frequency=1
    - algorithm_kwargs.policy_lr=3.57538014e-05
    - algorithm_kwargs.q_lr=7.20203282e-05
    - algorithm_kwargs.replay_buffer_kwargs.capacity=500000
    - algorithm_kwargs.soft_update_weight=0.0012834950535
    - algorithm_kwargs.target_entropy=-3.8154229670763
    - algorithm_kwargs.target_network_frequency=1
    - algorithm_kwargs.update_every=4
    - seed=1
  job:
    name: run_mighty
    chdir: null
    override_dirname: algorithm_kwargs.alpha=0.1611006618012,algorithm_kwargs.alpha_lr=0.0049113986423,algorithm_kwargs.batch_size=128,algorithm_kwargs.gamma=0.9845515197115,algorithm_kwargs.learning_starts=10000,algorithm_kwargs.n_gradient_steps=2,algorithm_kwargs.n_policy_units=512,algorithm_kwargs.policy_frequency=1,algorithm_kwargs.policy_lr=3.57538014e-05,algorithm_kwargs.q_lr=7.20203282e-05,algorithm_kwargs.replay_buffer_kwargs.capacity=500000,algorithm_kwargs.soft_update_weight=0.0012834950535,algorithm_kwargs.target_entropy=-3.8154229670763,algorithm_kwargs.target_network_frequency=1,algorithm_kwargs.update_every=4,env=Walker2d-v4,num_envs=64,num_steps=500000,seed=1
    id: '5856607_4'
    num: 4
    config_name: sac_smac
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /bigwork/nhwpmoha/Mighty/Final_Evals/Mighty
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /bigwork/nhwpmoha/Mighty/Final_Evals/Mighty/mighty/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: /bigwork/nhwpmoha/Mighty/Final_Evals/Mighty/hpo/SAC_SMAC/Walker2d-v4/seed_1/4
    choices:
      search_space: sac_rs
      environment: gymnasium/pendulum
      algorithm: sac
      cluster: cpu
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: HyperSMAC
      hydra/launcher: submitit_slurm
      hydra/output: default
  verbose: false
