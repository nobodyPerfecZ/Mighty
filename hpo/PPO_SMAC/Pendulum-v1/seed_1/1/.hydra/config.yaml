runner: standard
debug: false
seed: 1
output_dir: hpo
wandb_project: null
tensorboard_file: null
experiment_name: PPO_SMAC/${env}/seed
eval_every_n_steps: 10000.0
n_episodes_eval: 20
checkpoint: null
save_model_every_n_steps: 500000.0
algorithm: PPO
algorithm_kwargs:
  rescale_action: false
  tanh_squash: false
  rollout_buffer_class:
    _target_: mighty.mighty_replay.MightyRolloutBuffer
  rollout_buffer_kwargs:
    buffer_size: 128
    gamma: 0.99
    gae_lambda: 0.9822540356778
    obs_shape: ???
    act_dim: ???
    n_envs: ???
    discrete_action: ???
  learning_rate: 0.0009727029887
  batch_size: 2048
  gamma: 0.9058511564319
  ppo_clip: 0.1979639710858
  value_loss_coef: 0.9311156405136
  entropy_coef: 0.079507119488
  max_grad_norm: 0.5492636992596
  hidden_sizes:
  - 256
  - 256
  activation: tanh
  n_gradient_steps: 18
  n_epochs: 6
  minibatch_size: 128
  kl_target: null
  use_value_clip: true
  policy_class: mighty.mighty_exploration.StochasticPolicy
  policy_kwargs:
    entropy_coefficient: 0.0
num_steps: 500000.0
env: Pendulum-v1
env_kwargs: {}
env_wrappers: []
num_envs: 16
search_space:
  hyperparameters:
    algorithm_kwargs.learning_rate:
      type: uniform_float
      lower: 1.0e-05
      upper: 0.001
      log: true
    algorithm_kwargs.gamma:
      type: uniform_float
      lower: 0.9
      upper: 0.9999
      log: false
    algorithm_kwargs.ppo_clip:
      type: uniform_float
      lower: 0.1
      upper: 0.3
      log: false
    algorithm_kwargs.value_loss_coef:
      type: uniform_float
      lower: 0.1
      upper: 1.0
      log: false
    algorithm_kwargs.entropy_coef:
      type: uniform_float
      lower: 0.0
      upper: 0.1
      log: false
    algorithm_kwargs.max_grad_norm:
      type: uniform_float
      lower: 0.1
      upper: 1.0
      log: false
    algorithm_kwargs.n_gradient_steps:
      type: uniform_int
      lower: 1
      upper: 20
      log: false
    algorithm_kwargs.n_epochs:
      type: uniform_int
      lower: 4
      upper: 16
      log: false
    algorithm_kwargs.rollout_buffer_kwargs.gae_lambda:
      type: uniform_float
      lower: 0.9
      upper: 1.0
      log: false
